name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m unittest discover -s tests -v
      - name: Dogfood — lock/verify roundtrip on the test fixture
        run: |
          cd tests/fixtures
          python -m mcp_sentinel.cli lock clean.json
          python -m mcp_sentinel.cli verify clean.json
        env:
          PYTHONPATH: ${{ github.workspace }}
