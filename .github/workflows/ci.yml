name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m unittest discover -s tests -v
      - name: Dogfood -- lock/verify roundtrip on the test fixture
        run: |
          cd tests/fixtures
          python -m mcp_sentinel.cli lock clean.json
          python -m mcp_sentinel.cli verify clean.json
        env:
          PYTHONPATH: ${{ github.workspace }}

  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: cargo test --all-targets
      - run: cargo clippy --all-targets -- -D warnings
      - name: Binary smoke test
        run: |
          cargo build --release
          ./target/release/mcp-sentinel scan ../tests/fixtures/clean.json
          ./target/release/mcp-sentinel --version

  cross-lang:
    # "Byte-compatible lockfiles" was previously only backed by frozen hash
    # constants in rust/src/lockfile.rs (real values, but a static snapshot
    # - nothing forces them to be regenerated if either implementation's
    # hashing drifts). This job runs the real Python and real Rust CLIs on
    # the same inputs and diffs their actual output on every push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: bash tests/cross_lang_diff.sh
        env:
          PYTHONPATH: ${{ github.workspace }}
